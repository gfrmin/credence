name: Publish images (credence-proxy + credence-pi daemon)

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/credence-proxy

jobs:
  unit-tests:
    name: Python/Julia integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - name: Instantiate Credence Julia project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Install Python workspace (server + search extras)
        run: uv sync --extra server --extra search --no-dev

      - name: credence-lint corpus self-test
        run: python3 tools/credence-lint/credence_lint.py --repo-root . test

      - name: credence-lint apps/ (pass one)
        run: python3 tools/credence-lint/credence_lint.py --repo-root . check apps/

      - name: Skin protocol-version invariant (header == PROTOCOL_VERSION)
        run: |
          hdr=$(grep -m1 '^Protocol-Version:' apps/skin/protocol.md | sed 's/Protocol-Version:[[:space:]]*//')
          cnst=$(grep -m1 'const PROTOCOL_VERSION' apps/skin/server.jl | sed 's/.*= *"//; s/".*//')
          echo "protocol.md header: '$hdr'  |  server.jl const: '$cnst'"
          test -n "$hdr" && test "$hdr" = "$cnst" \
            || { echo "Protocol-Version header must equal PROTOCOL_VERSION in server.jl"; exit 1; }

      - name: Run credence_router + credence_agents pytest
        env:
          ANTHROPIC_API_KEY: sk-ant-test-smoke
          CREDENCE_JULIA: julia
          PYTHON_JULIACALL_HANDLE_SIGNALS: "yes"
        run: |
          uv run pytest \
            apps/python/credence_router/tests/ \
            apps/python/credence_agents/tests/ \
            --ignore=apps/python/credence_router/tests/test_live.py \
            -v

      - name: credence-pi Julia tests
        run: |
          for f in apps/credence-pi/tests/julia/*.jl; do
            echo "=== $f ==="
            julia --project=. "$f"
          done

      - name: answer-brain Julia tests
        run: |
          for f in apps/answer-brain/tests/julia/*.jl; do
            echo "=== $f ==="
            julia --project=. "$f"
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: credence-pi extension build + tests
        working-directory: apps/credence-pi/extension
        run: |
          npm install
          npm run build
          npm test

      - name: credence-pi OpenClaw-plugin build + tests
        working-directory: apps/credence-pi/openclaw-plugin
        run: |
          npm install
          npm run build
          npm test

      # ── answer-brain (the principled RAG answer-brain on pi-mono) ──
      # The governor core (brain-body) and the pi-mono body extension.
      # Each is self-contained: `tsc --noEmit` + node:test via tsx.
      - name: answer-brain brain-body build + tests
        working-directory: packages/brain-body
        run: |
          npm install
          npm run build
          npm test

      - name: answer-brain extension build + tests
        working-directory: apps/answer-brain/extension
        run: |
          npm install
          npm run build
          npm test

  smoke-build:
    name: Build amd64 + smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    # No packages: write — this job only builds and smoke-tests locally.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build amd64 locally so we can run it as a startup smoke test.
      # If startup fails here, we never push — the exact class of bug
      # that slipped into v0.3.1 (KeyError on Julia symbol). Cache
      # layers are written to GHA for the publish job to reuse.
      - name: Build amd64 for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: credence-proxy:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container reaches /ready
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI || 'sk-ant-test-smoke' }}
        run: |
          set -e
          docker run -d --rm --name credence-proxy-smoke \
            -p 8377:8377 \
            -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            credence-proxy:smoke
          # Poll /ready up to 3 min. Precompiled image should answer well before.
          for i in $(seq 1 36); do
            if curl -fsS --max-time 5 http://localhost:8377/ready; then
              echo "/ready OK after ${i}0s"
              echo "--- /health ---"
              curl -fsS http://localhost:8377/health
              echo
              echo "--- /state (head) ---"
              curl -fsS http://localhost:8377/state | head -c 400
              echo
              docker stop credence-proxy-smoke
              exit 0
            fi
            sleep 5
          done
          echo "=== SMOKE TEST FAILED — container never reached /ready ==="
          docker logs credence-proxy-smoke
          docker stop credence-proxy-smoke
          exit 1

  publish:
    name: Publish multi-arch to GHCR
    runs-on: ubuntu-latest
    needs: smoke-build
    # Job-level gate: publish only on master pushes and version tags.
    # PR runs and workflow_dispatch on non-master refs never enter this
    # job at all, so the packages: write permission is scoped to the
    # pushes that actually need it.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      # Multi-arch build + push. Reuses cache layers written by
      # smoke-build above; amd64 is a cache hit, arm64 is fresh.
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── credence-pi daemon (the Bayesian governance brain) ──────────────
  # Same shape as the credence-proxy jobs above, for
  # apps/credence-pi/daemon/Dockerfile -> ghcr.io/<owner>/credence-pi-daemon.
  # Separate GHA cache scope so the two images don't evict each other.
  daemon-smoke-build:
    name: Build daemon amd64 + smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    # No packages: write — build + smoke only; never pushes.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build daemon amd64 for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/credence-pi/daemon/Dockerfile
          platforms: linux/amd64
          load: true
          tags: credence-pi-daemon:smoke
          cache-from: type=gha,scope=credence-pi-daemon
          cache-to: type=gha,mode=max,scope=credence-pi-daemon

      - name: Smoke-test daemon reaches /ready and accepts exec
        run: |
          set -e
          docker run -d --rm --name credence-pi-daemon-smoke \
            -p 8787:8787 credence-pi-daemon:smoke
          # Poll /ready up to 3 min (precompiled image answers well before).
          for i in $(seq 1 36); do
            if curl -fsS --max-time 5 http://localhost:8787/ready; then
              echo "/ready OK after ${i}0s"
              # Assert the baked vocabulary accepts `exec` (the fix). The
              # pre-fix image returns 500 here ("not a declared bucket").
              code=$(curl -s -o /dev/null -w '%{http_code}' \
                -X POST http://localhost:8787/sensor \
                -H 'Content-Type: application/json' \
                -d '{"event_type":"tool-proposed","event_id":"ci-smoke-exec","features":{"tool-name":"exec","working-directory-relative":"project-root","parent-tool-call-name":"none","recent-repetition-count":"rep-0","recent-identical-call-count":"ident-0","time-since-last-user-message":"lt-30s"},"proposed_call":{"tool_name":"exec","input":{"command":"ls"}}}')
              echo "POST /sensor exec -> HTTP $code"
              if [ "$code" != "200" ]; then
                echo "=== exec NOT accepted (vocab fix missing from image) ==="
                docker logs credence-pi-daemon-smoke
                docker stop credence-pi-daemon-smoke
                exit 1
              fi
              docker stop credence-pi-daemon-smoke
              exit 0
            fi
            sleep 5
          done
          echo "=== DAEMON SMOKE FAILED — never reached /ready ==="
          docker logs credence-pi-daemon-smoke
          docker stop credence-pi-daemon-smoke
          exit 1

  publish-daemon:
    name: Publish daemon multi-arch to GHCR
    runs-on: ubuntu-latest
    needs: daemon-smoke-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract daemon image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/credence-pi-daemon
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push daemon multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/credence-pi/daemon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=credence-pi-daemon
          cache-to: type=gha,mode=max,scope=credence-pi-daemon

  # ── credence-skin (the versioned Credence engine artifact) ──────────────
  # Builds Dockerfile.skin -> ghcr.io/<owner>/credence-skin and smoke-tests the
  # stdio JSON-RPC wire (initialize handshake) before publishing. Separate GHA
  # cache scope so the engine image doesn't evict the proxy/daemon caches.
  skin-smoke-build:
    name: Build skin amd64 + stdio smoke
    runs-on: ubuntu-latest
    needs: unit-tests
    # No packages: write — build + smoke only; never pushes.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build skin amd64 for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.skin
          platforms: linux/amd64
          load: true
          tags: credence-skin:smoke
          cache-from: type=gha,scope=credence-skin
          cache-to: type=gha,mode=max,scope=credence-skin

      - name: Smoke-test the skin wire (initialize handshake over stdio)
        run: |
          set -e
          out=$(printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocol":"1"}}' \
            '{"jsonrpc":"2.0","id":2,"method":"shutdown","params":{}}' \
            | timeout 180 docker run --rm -i credence-skin:smoke)
          echo "=== skin output ==="
          echo "$out"
          echo "$out" | grep -q '"status":"ready"' || { echo "no ready sentinel"; exit 1; }
          echo "$out" | grep -q '"protocol":"1.0"' || { echo "initialize did not return protocol 1.0"; exit 1; }
          echo "skin wire smoke OK"

  publish-skin:
    name: Publish skin multi-arch to GHCR
    runs-on: ubuntu-latest
    needs: skin-smoke-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract skin image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/credence-skin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push skin multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.skin
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=credence-skin
          cache-to: type=gha,mode=max,scope=credence-skin
