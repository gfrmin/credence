services:
  credence-proxy:
    build: .
    ports:
      - "8377:8377"
    environment:
      # LLM providers (at least one required for LLM routing)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Search providers (optional — DuckDuckGo is always available)
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # Routing tuning
      - CREDENCE_REWARD=${CREDENCE_REWARD:-1.0}
      - CREDENCE_LATENCY_WEIGHT=${CREDENCE_LATENCY_WEIGHT:-0.01}
      # Override routing (for A/B testing): set to a model name to bypass routing
      - CREDENCE_FORCE_MODEL=${CREDENCE_FORCE_MODEL:-}
    volumes:
      - credence-data:/data
    restart: unless-stopped

volumes:
  credence-data:
